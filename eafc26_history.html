<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EAFC 26 · Club History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;
  --bg2:#0f1018;
  --bg3:#161820;
  --bg4:#1d1f2a;
  --border:rgba(255,255,255,.05);
  --border2:rgba(255,255,255,.1);
  --text:#e2e4ef;
  --text2:#7a7f94;
  --text3:#414558;
  --gold:#e8c56d;
  --gold2:#f5d98b;
  --blue:#4a8aff;
  --green:#34d399;
  --red:#f87171;
  --purple:#c084fc;
  --teal:#2dd4bf;
  --amber:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;background-image:radial-gradient(ellipse 90% 45% at 50% 0%,rgba(74,138,255,.07) 0%,transparent 65%)}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ── Top nav ── */
.topnav{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 24px;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-crest{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-text{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}
.logo-text b{color:var(--text)}
.nav-links{display:flex;gap:6px;flex-wrap:wrap}
.nav-link{padding:5px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .14s;font-family:'DM Sans',sans-serif}
.nav-link:hover{background:var(--bg4);color:var(--text)}
.nav-link.active{background:linear-gradient(135deg,rgba(74,138,255,.12),var(--bg4));color:var(--text);border-color:rgba(74,138,255,.25)}

/* ── Hero ── */
.hero{padding:60px 24px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(74,138,255,.08),transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:12px;opacity:.8}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(36px,6vw,64px);color:var(--text);line-height:1.05;letter-spacing:-.5px;margin-bottom:10px}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:14px;color:var(--text2);max-width:400px;margin:0 auto 28px;line-height:1.7}
.hero-stats{display:inline-flex;gap:0;background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--border2);border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hero-stat{padding:12px 20px;text-align:center;border-right:1px solid var(--border)}
.hero-stat:last-child{border-right:none}
.hs-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--gold)}
.hs-lbl{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-top:3px}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:8px;padding:0 24px;margin-bottom:0;flex-wrap:wrap;max-width:900px;margin:0 auto 8px}
.filter-chip{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s}
.filter-chip:hover{background:var(--bg3);color:var(--text)}
.filter-chip.on{color:#fff;border-color:transparent}
.filter-chip[data-cat=all].on{background:var(--bg4);color:var(--text)}
.filter-chip[data-cat=match].on{background:rgba(74,138,255,.25);color:var(--blue);border-color:rgba(74,138,255,.3)}
.filter-chip[data-cat=transfer].on{background:rgba(45,212,191,.2);color:var(--teal);border-color:rgba(45,212,191,.3)}
.filter-chip[data-cat=player].on{background:rgba(251,191,36,.2);color:var(--amber);border-color:rgba(251,191,36,.3)}
.filter-chip[data-cat=milestone].on{background:rgba(192,132,252,.2);color:var(--purple);border-color:rgba(192,132,252,.3)}

/* ── Timeline ── */
.timeline{max-width:900px;margin:0 auto;padding:32px 24px 80px;position:relative}

/* The spine */
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--border2) 60px,var(--border2) calc(100% - 60px),transparent);transform:translateX(-50%);pointer-events:none}

@media(max-width:640px){
  .timeline::before{left:20px}
}

/* Year dividers */
.year-divider{display:flex;align-items:center;justify-content:center;margin:32px 0 24px;position:relative;z-index:2}
.year-divider span{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 16px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text2);letter-spacing:1px}

/* Individual event cards */
.tl-event{display:flex;align-items:flex-start;gap:0;margin-bottom:24px;position:relative;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.tl-event.left{flex-direction:row-reverse}
.tl-event.right{flex-direction:row}

/* Dot on the spine */
.tl-dot{flex-shrink:0;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);position:absolute;left:50%;transform:translateX(-50%);top:18px;z-index:3;transition:transform .2s,box-shadow .2s}
.tl-event:hover .tl-dot{transform:translateX(-50%) scale(1.5);box-shadow:0 0 0 4px rgba(255,255,255,.07)}
@media(max-width:640px){.tl-dot{left:20px}}

/* Card body */
.tl-card{width:calc(50% - 24px);background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:border-color .2s,transform .2s,box-shadow .2s;cursor:default;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.tl-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.tl-event.left .tl-card{margin-right:24px}
.tl-event.right .tl-card{margin-left:24px}
@media(max-width:640px){
  .tl-event.left,.tl-event.right{flex-direction:row}
  .tl-card{width:calc(100% - 48px);margin-left:36px!important;margin-right:0!important}
}

/* Card contents */
.tl-cat{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;padding:2px 7px;border-radius:4px}
.tl-headline{font-family:'DM Serif Display',serif;font-size:16px;line-height:1.25;color:var(--text);margin-bottom:4px}
.tl-body{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.tl-date{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)}
.tl-badge-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tl-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3)}
.tl-score{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;margin-top:4px}
.tl-player-av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;vertical-align:middle;margin-right:6px;flex-shrink:0}

/* Category colours */
.cat-match{background:rgba(74,138,255,.15);color:var(--blue)}
.cat-transfer{background:rgba(45,212,191,.15);color:var(--teal)}
.cat-player{background:rgba(251,191,36,.15);color:var(--amber)}
.cat-milestone{background:rgba(192,132,252,.15);color:var(--purple)}
.dot-match{background:var(--blue)}
.dot-transfer{background:var(--teal)}
.dot-player{background:var(--amber)}
.dot-milestone{background:var(--purple)}

/* Highlighted events (big wins, first MOTM etc) */
.tl-card.highlight{border-color:rgba(232,197,109,.25);background:linear-gradient(135deg,var(--bg2),rgba(232,197,109,.06));box-shadow:0 2px 12px rgba(232,197,109,.08)}
.tl-card.highlight .tl-headline{color:var(--gold2)}

/* Snapshot / top performers */
.snapshot{max-width:900px;margin:0 auto 4px;padding:0 24px}
.snap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.snap-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .18s}
.snap-card:hover{border-color:var(--border2)}
.snap-av{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.snap-av.icon{font-size:18px;background:var(--bg3)}
.snap-info{min-width:0}
.snap-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.snap-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.snap-lbl{font-size:9px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);margin-top:3px}

/* Form strip */
.form-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.form-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.form-dots{display:flex;gap:5px;flex-wrap:wrap}
.form-dot{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:0;flex-shrink:0}
.form-dot.W{background:rgba(52,211,153,.2);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.form-dot.D{background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.form-dot.L{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.25)}

/* Search + filter */
.tl-search{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 14px;outline:none;width:180px;transition:border-color .15s}
.tl-search:focus{border-color:var(--blue);width:220px}
.filter-count{font-size:10px;opacity:.6;margin-left:3px}

/* Improved hero stats */
.hero-stats{display:inline-grid;grid-template-columns:repeat(4,1fr);gap:0;background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--border2);border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hero-stat{padding:10px 18px;text-align:center;border-right:1px solid var(--border)}
.hero-stat:nth-child(4n){border-right:none}
.hero-stat:nth-child(n+5){border-top:1px solid var(--border)}
.hs-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--gold)}
.hs-lbl{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-top:3px}

/* Empty state */
.tl-empty{text-align:center;padding:80px 20px}
.tl-empty-icon{font-size:48px;margin-bottom:16px;opacity:.2}
.tl-empty-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text2);margin-bottom:8px}
.tl-empty-sub{font-size:13px;color:var(--text3);line-height:1.7}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:9px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>

<!-- Hero -->
<div class="hero" id="hero">
  <div class="hero-eyebrow">Career Mode · Club History</div>
  <h1 class="hero-title">The <em>Story</em> So Far</h1>
  <p class="hero-sub">Every milestone, every signing, every triumph — automatically compiled from your save.</p>
  <div class="hero-stats" id="heroStats">
    <div class="hero-stat"><div class="hs-val" id="statMatches">—</div><div class="hs-lbl">Matches</div></div>
    <div class="hero-stat"><div class="hs-val" id="statWins">—</div><div class="hs-lbl">Wins</div></div>
    <div class="hero-stat"><div class="hs-val" id="statWinPct">—</div><div class="hs-lbl">Win %</div></div>
    <div class="hero-stat"><div class="hs-val" id="statStreak">—</div><div class="hs-lbl">Win Streak</div></div>
    <div class="hero-stat"><div class="hs-val" id="statGF">—</div><div class="hs-lbl">Goals</div></div>
    <div class="hero-stat"><div class="hs-val" id="statGD">—</div><div class="hs-lbl">Goal Diff</div></div>
    <div class="hero-stat"><div class="hs-val" id="statTransfers">—</div><div class="hs-lbl">Transfers</div></div>

<!-- Filter bar -->

  <input class="tl-search" id="tlSearch" type="text" placeholder="Search events…" oninput="handleSearch(this.value)">
  <button class="filter-chip on" data-cat="all" onclick="setFilter('all')">All Events</button>
  <button class="filter-chip" data-cat="match" onclick="setFilter('match')">⚽ Matches</button>
  <button class="filter-chip" data-cat="transfer" onclick="setFilter('transfer')">🔄 Transfers</button>
  <button class="filter-chip" data-cat="player" onclick="setFilter('player')">⭐ Player</button>
  <button class="filter-chip" data-cat="milestone" onclick="setFilter('milestone')">🏆 Milestones</button>
</div>

<!-- Timeline -->
<div class="timeline" id="timeline"></div>

<div class="toast" id="toast"></div>

<script>
// ── Load all data ─────────────────────────────────────────────────────────────
const AVC=['#4a8aff','#34d399','#fbbf24','#f87171','#c084fc','#2dd4bf','#f97316','#ec4899'];
function avc(n){let h=0;for(const c of n||'')h=(h+c.charCodeAt(0))%AVC.length;return AVC[h];}
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmtDate(d){if(!d)return '—';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});}
function fmtShort(d){if(!d)return '—';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

let SQUAD=[], MATCHES=[], TRANSFERS=[];
try{const d=JSON.parse(localStorage.getItem('eafc26v12')||'null');if(d?.players)SQUAD=d.players;}catch{}
try{const d=JSON.parse(localStorage.getItem('eafc26_matches')||'[]');MATCHES=Array.isArray(d)?d:[];}catch{}
try{const d=JSON.parse(localStorage.getItem('eafc26_transfers')||'[]');TRANSFERS=Array.isArray(d)?d:[];}catch{}

// OVR helper
const W={GK:{"Reactions":12,"GK Diving":22,"GK Handling":22,"GK Kicking":6,"GK Positioning":22,"GK Reflexes":22},CB:{"Heading Accuracy":11,"Short Passing":6,"Ball Control":5,"Acceleration":6,"Sprint Speed":3,"Jumping":4,"Strength":11,"Def Awareness":15,"Stand Tackle":18,"Slide Tackle":11,"Aggression":8,"Interceptions":14,"Reactions":6},LB:{"Crossing":10,"Finishing":5,"Heading Accuracy":5,"Short Passing":8,"Ball Control":8,"Acceleration":6,"Sprint Speed":8,"Reactions":6,"Stamina":9,"Def Awareness":9,"Stand Tackle":12,"Slide Tackle":15,"Interceptions":12},RB:{"Crossing":10,"Finishing":5,"Heading Accuracy":5,"Short Passing":8,"Ball Control":8,"Acceleration":6,"Sprint Speed":8,"Reactions":6,"Stamina":9,"Def Awareness":9,"Stand Tackle":12,"Slide Tackle":15,"Interceptions":12},CDM:{"Short Passing":15,"Ball Control":11,"Reactions":8,"Stamina":7,"Strength":5,"Def Awareness":10,"Stand Tackle":13,"Slide Tackle":6,"Aggression":6,"Interceptions":15,"Long Passing":11,"Vision":5},CM:{"Finishing":3,"Short Passing":18,"Dribbling":8,"Ball Control":15,"Reactions":9,"Stamina":7,"Long Shots":5,"Stand Tackle":6,"Interceptions":6,"Positioning":7,"Long Passing":14,"Vision":5},LM:{"Crossing":11,"Finishing":7,"Short Passing":12,"Dribbling":16,"Ball Control":14,"Acceleration":8,"Sprint Speed":7,"Reactions":8,"Stamina":6,"Interceptions":6,"Positioning":7,"Long Passing":6,"Vision":14},LW:{"Crossing":11,"Finishing":7,"Short Passing":12,"Dribbling":16,"Ball Control":14,"Acceleration":8,"Sprint Speed":7,"Reactions":8,"Stamina":6,"Interceptions":6,"Positioning":7,"Long Passing":6,"Vision":14},RW:{"Crossing":10,"Finishing":11,"Short Passing":10,"Dribbling":17,"Ball Control":15,"Acceleration":8,"Sprint Speed":7,"Agility":4,"Reactions":8,"Long Shots":5,"Positioning":10,"Vision":15},CAM:{"Finishing":8,"Short Passing":17,"Dribbling":14,"Ball Control":16,"Acceleration":5,"Sprint Speed":4,"Agility":4,"Reactions":8,"Long Shots":6,"Positioning":9,"Long Passing":5,"Vision":8},CF:{"Finishing":12,"Heading Accuracy":3,"Short Passing":10,"Dribbling":15,"Ball Control":16,"Acceleration":6,"Sprint Speed":6,"Reactions":10,"Shot Power":6,"Long Shots":5,"Positioning":14,"Vision":9},ST:{"Positioning":24.07,"Heading Accuracy":19.83,"Finishing":14.06,"Sprint Speed":12.27,"Reactions":8.89,"Acceleration":8.36,"Long Shots":4.45,"Dribbling":4.14,"Short Passing":3.52}};
function ovr(p){if(p.manualOVR)return parseInt(p.manualOVR)||0;if(!p.stats||!p.position)return 0;const w=W[p.position];if(!w)return 0;const t=Object.values(w).reduce((a,b)=>a+b,0);return Math.round(Object.entries(w).reduce((s,[k,wi])=>s+(p.stats[k]||0)*wi/t,0));}

// ── Build events ──────────────────────────────────────────────────────────────
let EVENTS=[];
let activeFilter='all';

function buildEvents(){
  EVENTS=[];

  // ── Matches ──
  MATCHES.forEach(m=>{
    const isW=m.goalsFor>m.goalsAgainst;
    const isD=m.goalsFor===m.goalsAgainst;
    const bigWin=isW&&(m.goalsFor-m.goalsAgainst)>=3;
    const cleanSheet=isW&&m.goalsAgainst===0;
    const thriller=!isD&&(m.goalsFor+m.goalsAgainst)>=5;

    // Find MOTM in this match
    let motmPlayer=null;
    if(m.playerStats){
      const motmId=Object.entries(m.playerStats).find(([,ps])=>ps.motm)?.[0];
      if(motmId)motmPlayer=SQUAD.find(p=>p.id===motmId);
    }

    // Build headline
    let headline='';
    let body='';
    let highlight=false;

    if(bigWin){headline=`Dominant win over ${m.opponent||'opponents'}`;highlight=true;}
    else if(cleanSheet){headline=`Clean sheet against ${m.opponent||'opponents'}`;highlight=true;}
    else if(thriller){headline=`Thriller vs ${m.opponent||'opponents'}`;highlight=true;}
    else if(isW){headline=`Victory over ${m.opponent||'opponents'}`;}
    else if(isD){headline=`Draw with ${m.opponent||'opponents'}`;}
    else{headline=`Defeat to ${m.opponent||'opponents'}`;}

    const gd=(m.goalsFor??0)-(m.goalsAgainst??0);
    body=(m.venue==='Away'?'Away ':'Home ')+(m.competition||'')+(m.formation?' · '+m.formation:'');
    if(motmPlayer)body+=` · MOTM: ${motmPlayer.name}`;

    const badges=[];
    if(bigWin)badges.push({label:'Big Win 🔥',color:'#34d39930'});
    if(cleanSheet)badges.push({label:'Clean Sheet 🧤',color:'#4a8aff30'});
    if(thriller)badges.push({label:'Thriller ⚡',color:'#fbbf2430'});
    if(m.competition==='Champions League')badges.push({label:'UCL',color:'#c084fc30'});

    EVENTS.push({
      date:m.date,cat:'match',headline,body,
      score:(m.goalsFor??0)+' – '+(m.goalsAgainst??0),
      scoreColor:isW?'#34d399':isD?'#fbbf24':'#f87171',
      badges,highlight,
      motmPlayer,matchId:m.id
    });

    // MOTM milestone as separate event
    if(motmPlayer){
      const allMOTMs=MATCHES.filter(mx=>mx.playerStats&&Object.values(mx.playerStats||{}).some(ps=>ps.motm));
      const playerMOTMs=allMOTMs.filter(mx=>mx.playerStats&&mx.playerStats[motmPlayer.id]?.motm);
      const motmCount=playerMOTMs.length;
      if(motmCount===1||motmCount===5||motmCount===10){
        EVENTS.push({
          date:m.date,cat:'player',
          headline:`${motmPlayer.name} wins ${motmCount===1?'first':motmCount+'th'} Man of the Match`,
          body:`Outstanding performance vs ${m.opponent||'?'}`,
          icon:'⭐',playerId:motmPlayer.id,
          badges:[{label:`${motmCount} MOTM${motmCount>1?'s':''}`,color:'#fbbf2430'}],
          highlight:motmCount>=5
        });
      }
    }
  });

  // ── Transfers ──
  TRANSFERS.forEach(t=>{
    const isIn=t.dir==='in';
    const fee=parseFloat(t.fee)||0;
    const bigDeal=fee>=30;
    const freeDeal=fee===0;
    EVENTS.push({
      date:t.date||'',
      cat:'transfer',
      headline:isIn
        ?`${t.name} joins${t.club?' from '+t.club:''}`
        :`${t.name} departs${t.club?' to '+t.club:''}`,
      body:(t.position||'')+(t.season?' · '+t.season:'')+(freeDeal?' · Free transfer':fee?' · £'+fee.toFixed(1)+'M':''),
      icon:isIn?'↓':'↑',
      iconColor:isIn?'#34d399':'#f87171',
      badges:bigDeal?[{label:'Record Signing 💰',color:'#e8c56d30'}]:freeDeal?[{label:'Free Transfer',color:'#ffffff15'}]:[],
      highlight:bigDeal,
      playerName:t.name,playerPos:t.position
    });
  });

  // ── Player history milestones ──
  SQUAD.forEach(p=>{
    if(!p.history||!p.history.length)return;
    const ms=p.matchStats||{};

    p.history.forEach((h,i)=>{
      if(!h.date)return;
      const prev=i>0?p.history[i-1]:null;
      const ovrGain=prev?(h.ovr||0)-(prev.ovr||0):0;
      const bigGain=ovrGain>=3;
      const crossed90=h.ovr>=90&&(!prev||prev.ovr<90);
      const crossed85=h.ovr>=85&&(!prev||prev.ovr<85);
      const crossed80=h.ovr>=80&&(!prev||prev.ovr<80);
      const crossed75=h.ovr>=75&&(!prev||prev.ovr<75);

      if(crossed90||crossed85||crossed80||crossed75||bigGain){
        const threshold=crossed90?90:crossed85?85:crossed80?80:crossed75?75:null;
        EVENTS.push({
          date:h.date,cat:'player',
          headline:threshold
            ?`${p.name} reaches ${threshold} OVR`
            :`${p.name} gains ${ovrGain} OVR — major upgrade`,
          body:`${h.upgrades?.length?h.upgrades.map(u=>u.stat).join(', ')+' improved':''}${h.note?' · '+h.note:''}`,
          icon:'📈',playerId:p.id,playerName:p.name,playerPos:p.position,
          badges:threshold?[{label:`${threshold} OVR 🎯`,color:'#e8c56d30'}]:[{label:`+${ovrGain} OVR`,color:'#34d39930'}],
          highlight:crossed90||crossed85,ovr:h.ovr
        });
      } else if(h.upgrades&&h.upgrades.length>0&&(i===0||ovrGain>0)){
        EVENTS.push({
          date:h.date,cat:'player',
          headline:`${p.name} upgraded`,
          body:`${h.upgrades.map(u=>u.stat+' +'+u.delta).join(' · ')}${h.note?' — '+h.note:''}`,
          icon:'⬆',playerId:p.id,playerName:p.name,playerPos:p.position,
          badges:[],highlight:false,ovr:h.ovr
        });
      }
    });

    // Academy promotion milestone
    if(p.squad==='first'&&p.history&&p.history.length){
      // Only if they have an academy flag or potLow was set initially
      // We detect this if potLow was ever set (was in academy)
      const hadPotential=p.history.some(h=>h.potLow);
      if(hadPotential){
        const firstEntry=p.history[0];
        if(firstEntry?.date){
          EVENTS.push({
            date:firstEntry.date,cat:'milestone',
            headline:`${p.name} graduates to First Team`,
            body:`${p.position||''}${firstEntry.ovr?' · OVR '+firstEntry.ovr:''}`,
            icon:'🌟',playerId:p.id,playerName:p.name,playerPos:p.position,
            badges:[{label:'Academy Graduate',color:'#fbbf2430'}],highlight:true
          });
        }
      }
    }

    // Appearance milestones
    const apps=ms.apps||0;
    [10,25,50,100].forEach(n=>{
      if(apps>=n){
        // Check if the nth match date is available
        const matchDates=MATCHES.filter(m=>{
          const slots=[...(m.xi||[]).filter(Boolean).map(s=>s.playerId),...(m.subs||[]).map(s=>s.playerId)];
          return slots.includes(p.id);
        }).map(m=>m.date).sort();
        const nthDate=matchDates[n-1];
        if(nthDate){
          EVENTS.push({
            date:nthDate,cat:'milestone',
            headline:`${p.name} makes ${n}${n===10?'th':n===25?'th':n===50?'th':'th'} appearance`,
            body:`${p.position||''} — ${ms.goals||0} goals, ${ms.assists||0} assists in career`,
            icon:'🎖️',playerId:p.id,playerName:p.name,playerPos:p.position,
            badges:[{label:n+' Appearances',color:'#c084fc30'}],
            highlight:n>=50
          });
        }
      }
    });

    // Goal milestones
    const goals=ms.goals||0;
    [10,25,50].forEach(n=>{
      if(goals>=n){
        const goalMatches=MATCHES.filter(m=>m.playerStats?.[p.id]?.goals>0).sort((a,b)=>a.date?.localeCompare(b.date||'')||0);
        let gCount=0;let nthMatch=null;
        for(const m of goalMatches){const g=m.playerStats[p.id]?.goals||0;gCount+=g;if(gCount>=n&&!nthMatch)nthMatch=m;}
        if(nthMatch){
          EVENTS.push({
            date:nthMatch.date,cat:'milestone',
            headline:`${p.name} scores ${n}th career goal`,
            body:`${p.position||''} — against ${nthMatch.opponent||'?'}`,
            icon:'⚽',playerId:p.id,playerName:p.name,playerPos:p.position,
            badges:[{label:n+' Goals 🥅',color:'#34d39930'}],highlight:n>=25
          });
        }
      }
    });
  });

  // ── Overall squad milestones ──
  if(MATCHES.length){
    // 10th, 50th, 100th match
    [10,50,100].forEach(n=>{
      if(MATCHES.length>=n){
        const m=MATCHES.sort((a,b)=>a.date?.localeCompare(b.date||'')||0)[n-1];
        if(m?.date){
          EVENTS.push({
            date:m.date,cat:'milestone',
            headline:`Club's ${n}th official match`,
            body:`vs ${m.opponent||'?'} · ${m.competition||''}`,
            icon:'🏟️',
            badges:[{label:`Match #${n}`,color:'#c084fc30'}],highlight:n>=50
          });
        }
      }
    });

    // First win, first away win, first clean sheet
    const wins=MATCHES.filter(m=>m.goalsFor>m.goalsAgainst).sort((a,b)=>a.date?.localeCompare(b.date||'')||0);
    if(wins.length){
      EVENTS.push({date:wins[0].date,cat:'milestone',headline:'First victory',body:`${wins[0].goalsFor??0}–${wins[0].goalsAgainst??0} vs ${wins[0].opponent||'?'}`,icon:'🥇',badges:[{label:'First Win',color:'#e8c56d30'}],highlight:true});
    }
    const awayWins=wins.filter(m=>m.venue==='Away');
    if(awayWins.length){
      EVENTS.push({date:awayWins[0].date,cat:'milestone',headline:'First away victory',body:`@ ${awayWins[0].opponent||'?'} · ${awayWins[0].goalsFor??0}–${awayWins[0].goalsAgainst??0}`,icon:'✈️',badges:[{label:'Away Win',color:'#4a8aff30'}],highlight:true});
    }
    const cleanSheets=MATCHES.filter(m=>m.goalsFor>m.goalsAgainst&&m.goalsAgainst===0).sort((a,b)=>a.date?.localeCompare(b.date||'')||0);
    if(cleanSheets.length){
      EVENTS.push({date:cleanSheets[0].date,cat:'milestone',headline:'First clean sheet',body:`${cleanSheets[0].goalsFor??0}–0 vs ${cleanSheets[0].opponent||'?'}`,icon:'🧤',badges:[{label:'Clean Sheet',color:'#4a8aff30'}],highlight:false});
    }
  }

  // Sort all events by date descending (newest first)
  EVENTS.sort((a,b)=>b.date?.localeCompare(a.date||'')||0);

}

// ── Stats + Snapshot ──────────────────────────────────────────────────────────
function computeStats(){
  const sorted=[...MATCHES].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const wins=sorted.filter(m=>m.goalsFor>m.goalsAgainst).length;
  const total=sorted.length;
  const gf=sorted.reduce((s,m)=>s+(parseInt(m.goalsFor)||0),0);
  const ga=sorted.reduce((s,m)=>s+(parseInt(m.goalsAgainst)||0),0);
  const winPct=total?Math.round(wins/total*100):0;

  // Current win streak (from most recent matches backwards)
  let streak=0;
  for(let i=sorted.length-1;i>=0;i--){
    if(sorted[i].goalsFor>sorted[i].goalsAgainst)streak++;else break;
  }

  // Top performers from match stats
  const perfMap={};
  SQUAD.forEach(p=>{
    const ms=p.matchStats||{};
    if((ms.apps||0)>0)perfMap[p.id]={p,goals:ms.goals||0,assists:ms.assists||0,motms:ms.motms||0,avgRating:ms.avgRating||0,apps:ms.apps||0};
  });
  const perf=Object.values(perfMap);
  const topScorer=perf.sort((a,b)=>b.goals-a.goals)[0];
  const mostMotm=perf.sort((a,b)=>b.motms-a.motms)[0];
  const bestRated=perf.filter(x=>x.apps>=3).sort((a,b)=>b.avgRating-a.avgRating)[0];

  // Update hero stats
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('statMatches',total||'—');
  set('statWins',wins||'—');
  set('statWinPct',total?(winPct+'%'):'—');
  set('statStreak',streak||'—');
  set('statGF',gf||'—');
  const gdStr=(gf-ga)>0?'+'+(gf-ga):(gf-ga);
  set('statGD',total?gdStr:'—');
  set('statTransfers',TRANSFERS.length||'—');
  const milestoneCount=EVENTS.filter(e=>e.cat==='milestone').length;
  set('statMilestones',milestoneCount||'—');

  // Form strip (last 10)
  const snap=document.getElementById('snapshot');snap.innerHTML='';
  if(sorted.length){
    const last10=sorted.slice(-10).reverse();
    const fw=document.createElement('div');fw.className='form-wrap';
    const lbl=document.createElement('div');lbl.className='form-label';lbl.textContent='Recent Form';
    const dots=document.createElement('div');dots.className='form-dots';
    last10.forEach(m=>{
      const r=m.goalsFor>m.goalsAgainst?'W':m.goalsFor===m.goalsAgainst?'D':'L';
      const dot=document.createElement('div');dot.className='form-dot '+r;
      dot.title=(r==='W'?'Win':r==='D'?'Draw':'Loss')+' vs '+(m.opponent||'?')+' '+m.goalsFor+'-'+m.goalsAgainst;
      dot.textContent=r;dots.appendChild(dot);
    });
    fw.appendChild(lbl);fw.appendChild(dots);snap.appendChild(fw);
  }

  // Top performers grid
  if(perf.length){
    const grid=document.createElement('div');grid.className='snap-grid';
    function snapCard(val,name,pos,lbl,col){
      const card=document.createElement('div');card.className='snap-card';
      const av=document.createElement('div');av.className='snap-av';
      av.style.cssText=`background:${avc(name||'')}22;color:${avc(name||'')};border:1px solid ${avc(name||'')}33`;
      av.textContent=ini(name||'?');
      const info=document.createElement('div');info.className='snap-info';
      const v=document.createElement('div');v.className='snap-val';v.style.color=col||'var(--text)';v.textContent=val;
      const n=document.createElement('div');n.className='snap-name';n.textContent=name||'—';
      const l=document.createElement('div');l.className='snap-lbl';l.textContent=lbl;
      info.appendChild(v);info.appendChild(n);info.appendChild(l);
      card.appendChild(av);card.appendChild(info);return card;
    }
    if(topScorer&&topScorer.goals>0)grid.appendChild(snapCard(topScorer.goals+'⚽',topScorer.p.name,topScorer.p.position,'Top Scorer','#34d399'));
    if(bestRated&&bestRated.avgRating>0)grid.appendChild(snapCard(bestRated.avgRating.toFixed(1),bestRated.p.name,bestRated.p.position,'Best Rating','#4a8aff'));
    if(mostMotm&&mostMotm.motms>0)grid.appendChild(snapCard(mostMotm.motms+'⭐',mostMotm.p.name,mostMotm.p.position,'Most MOTM','#fbbf24'));
    if(grid.children.length)snap.appendChild(grid);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
let activeFilterKey='all';
let searchQuery='';

function handleSearch(q){
  searchQuery=q.toLowerCase().trim();
  renderTimeline();
}

function setFilter(cat){
  activeFilterKey=cat;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('on',c.dataset.cat===cat);
  });
  renderTimeline();
}

function updateChipCounts(){
  const cats=['all','match','transfer','player','milestone'];
  cats.forEach(cat=>{
    const count=cat==='all'?EVENTS.length:EVENTS.filter(e=>e.cat===cat).length;
    const chip=document.querySelector(`.filter-chip[data-cat="${cat}"]`);
    if(chip){
      const existing=chip.querySelector('.filter-count');
      if(existing)existing.remove();
      const badge=document.createElement('span');badge.className='filter-count';badge.textContent=count;
      chip.appendChild(badge);
    }
  });
}

function renderTimeline(){
  const tl=document.getElementById('timeline');
  tl.innerHTML='';

  let filtered=activeFilterKey==='all'?EVENTS:EVENTS.filter(e=>e.cat===activeFilterKey);
  if(searchQuery){
    filtered=filtered.filter(e=>{
      const hay=(e.headline+' '+(e.body||'')+' '+(e.playerName||'')).toLowerCase();
      return hay.includes(searchQuery);
    });
  }

  if(!filtered.length){
    const empty=document.createElement('div');empty.className='tl-empty';
    empty.innerHTML=`<div class="tl-empty-icon">${activeFilterKey==='match'?'⚽':activeFilterKey==='transfer'?'🔄':activeFilterKey==='player'?'⭐':'🏆'}</div><div class="tl-empty-title">No ${activeFilterKey==='all'?'events':activeFilterKey+' events'} yet</div><div class="tl-empty-sub">Start logging matches, transfers, and player progress to build your club history.</div>`;
    tl.appendChild(empty);
    return;
  }

  // Group by year
  let currentYear=null;
  filtered.forEach((ev,i)=>{
    const year=ev.date?ev.date.slice(0,4):'Unknown';
    if(year!==currentYear){
      currentYear=year;
      const yd=document.createElement('div');yd.className='year-divider';
      yd.innerHTML=`<span>${year}</span>`;
      tl.appendChild(yd);
    }

    const side=i%2===0?'right':'left';
    tl.appendChild(buildEventCard(ev,side,i));
  });
}

function buildEventCard(ev,side,idx){
  const wrapper=document.createElement('div');
  wrapper.className='tl-event '+side;
  wrapper.style.animationDelay=(idx%10*30)+'ms';

  // Dot on spine
  const dot=document.createElement('div');
  dot.className='tl-dot dot-'+ev.cat;
  wrapper.appendChild(dot);

  // Card
  const card=document.createElement('div');
  card.className='tl-card'+(ev.highlight?' highlight':'');

  // Category badge
  const catEl=document.createElement('div');
  catEl.className='tl-cat cat-'+ev.cat;
  const catLabels={match:'⚽ Match',transfer:'🔄 Transfer',player:'⭐ Player',milestone:'🏆 Milestone'};
  catEl.textContent=catLabels[ev.cat]||ev.cat;
  card.appendChild(catEl);

  // Score (for matches)
  if(ev.score){
    const scoreEl=document.createElement('div');
    scoreEl.className='tl-score';
    scoreEl.style.color=ev.scoreColor||'var(--text)';
    scoreEl.textContent=ev.score;
    card.appendChild(scoreEl);
  }

  // Player avatar inline (for player/transfer events)
  const headlineEl=document.createElement('div');
  headlineEl.className='tl-headline';
  if(ev.playerName&&(ev.cat==='player'||ev.cat==='transfer')){
    const av=document.createElement('span');
    av.className='tl-player-av';
    av.style.cssText=`background:${avc(ev.playerName)}22;color:${avc(ev.playerName)};border:1px solid ${avc(ev.playerName)}33`;
    av.textContent=ini(ev.playerName);
    headlineEl.appendChild(av);
  }
  if(ev.icon&&!ev.playerName){
    headlineEl.appendChild(document.createTextNode(ev.icon+' '));
  }
  headlineEl.appendChild(document.createTextNode(ev.headline));
  card.appendChild(headlineEl);

  // Body text
  if(ev.body){
    const bodyEl=document.createElement('div');
    bodyEl.className='tl-body';
    bodyEl.textContent=ev.body;
    card.appendChild(bodyEl);
  }

  // MOTM player callout
  if(ev.motmPlayer){
    const motmEl=document.createElement('div');
    motmEl.style.cssText='display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:4px 10px;background:rgba(251,191,36,.1);border-radius:6px;border:1px solid rgba(251,191,36,.2)';
    const av=document.createElement('span');
    av.style.cssText=`width:22px;height:22px;border-radius:50%;background:${avc(ev.motmPlayer.name)}22;color:${avc(ev.motmPlayer.name)};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700`;
    av.textContent=ini(ev.motmPlayer.name);
    const lbl=document.createElement('span');lbl.style.cssText='font-size:11px;color:var(--amber)';lbl.textContent='⭐ '+ev.motmPlayer.name+' — MOTM';
    motmEl.appendChild(av);motmEl.appendChild(lbl);
    card.appendChild(motmEl);
  }

  // Badges
  if(ev.badges&&ev.badges.length){
    const badgeRow=document.createElement('div');badgeRow.className='tl-badge-row';
    ev.badges.forEach(b=>{
      const badge=document.createElement('span');
      badge.className='tl-badge';
      badge.style.background=b.color||'var(--bg3)';
      badge.style.color='var(--text2)';
      badge.textContent=b.label;
      badgeRow.appendChild(badge);
    });
    card.appendChild(badgeRow);
  }

  // Date
  const dateEl=document.createElement('div');
  dateEl.className='tl-date';
  dateEl.style.marginTop='8px';
  dateEl.textContent=fmtDate(ev.date);
  card.appendChild(dateEl);

  wrapper.appendChild(card);
  return wrapper;
}

// ── Init ──────────────────────────────────────────────────────────────────────
if(!SQUAD.length&&!MATCHES.length&&!TRANSFERS.length){
  // Show empty state in hero
  document.getElementById('hero').querySelector('p').textContent='Open your squad tracker and log some matches, transfers, and player progress — your club history will build itself here automatically.';
  document.getElementById('timeline').innerHTML='<div class="tl-empty"><div class="tl-empty-icon">📜</div><div class="tl-empty-title">Your story begins now</div><div class="tl-empty-sub">Head to the Squad Tracker and start logging matches, transfers, and player upgrades.<br>Everything gets compiled here automatically.</div></div>';
} else {
  buildEvents();
  computeStats();
  updateChipCounts();
  renderTimeline();
}
</script>
